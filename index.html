<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/icons/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Prelaod Video -->
    <link
      rel="preload"
      href="./src/assets/videos/1.mp4"
      as="video"
      type="video/mp4"
    />

    <!-- SEO Title -->
    <title>Gaurav Sahu | Student Portfolio</title>

    <!-- SEO Description -->
    <meta
      name="description"
      content="Official portfolio of Gaurav Sahu, a student at DPS Kaluahi. Explore my interests, creativity, projects, and hobbies including solving the Rubik's Cube, traveling, watching science fiction movies, and learning new things."
    />

    <!-- Keywords -->
    <meta
      name="keywords"
      content="Gaurav Sahu, DPS Kalhahi, Gaurav Sahu Vercel, student portfolio, DPS Kaluahi, personal website, student portfolio website, Rubik's cube, technology enthusiast, portfolio"
    />

    <!-- Author -->
    <meta name="author" content="Gaurav Sahu" />

    <!-- Robots -->
    <meta name="robots" content="index, follow" />

    <!-- Open Graph (for social media preview) -->
    <meta property="og:title" content="Gaurav Sahu | Student Portfolio" />

      property="og:description"
      content="Hi! I'm Gaurav Sahu, a student at DPS Kaluahi. I created this website to explore creativity and curiosity while sharing my interests, hobbies, and experiences."

    <meta property="og:url" content="https://gauravsahu.vercel.app/" />
    <meta property="og:image" content="/icons/preview.png" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />

    <meta
      name="twitter:description"
      content="Personal portfolio of Gaurav Sahu, a student who enjoys learning new things, solving the cube, traveling, and watching science fiction and thriller movies."
